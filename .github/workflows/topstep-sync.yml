name: Real-Time Trade Sync
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Requests
        run: pip install requests
      - name: Run Sync
        env:
          PROJECTX_USERNAME: ${{ secrets.PROJECTX_USERNAME }}
          PROJECTX_API_KEY: ${{ secrets.PROJECTX_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python - <<'EOF'
          import os, requests, sys

          def log(m): print(f'--- {m}', flush=True)

          # 1. AUTH
          log('STARTING AUTH')
          u = os.environ.get('PROJECTX_USERNAME')
          k = os.environ.get('PROJECTX_API_KEY')

          res = requests.post(
              'https://api.thefuturesdesk.projectx.com/api/Auth/loginKey',
              json={'userName': u, 'apiKey': k}
          )
          if res.status_code != 200:
              log(f'AUTH FAILED: {res.status_code} - {res.text}')
              sys.exit(1)

          token = res.json().get('token')
          log('AUTH SUCCESS')

          # 2. GET ACCOUNT ID
          log('FETCHING ACCOUNT ID')
          acc_res = requests.get(
              'https://api.thefuturesdesk.projectx.com/api/Account/search',
              headers={'Authorization': f'Bearer {token}'},
              json={'onlyActiveAccounts': True}
          )
          if acc_res.status_code != 200:
              log(f'ACCOUNT FETCH FAILED: {acc_res.status_code} - {acc_res.text}')
              sys.exit(1)

          acc_raw = acc_res.json()
          accounts = acc_raw if isinstance(acc_raw, list) else acc_raw.get('accounts') or acc_raw.get('data') or []
          if not accounts:
              log('NO ACCOUNTS FOUND')
              sys.exit(1)

          account_id = accounts[0].get('id')
          log(f'USING ACCOUNT ID: {account_id}')

          # 3. FETCH TRADES
          log('FETCHING TRADES')
          t_res = requests.post(
              'https://api.thefuturesdesk.projectx.com/api/Trade/search',
              headers={'Authorization': f'Bearer {token}'},
              json={'accountId': account_id, 'startTime': '2026-03-30T00:00:00Z'}
          )
          if t_res.status_code != 200:
              log(f'FETCH FAILED: {t_res.status_code} - {t_res.text}')
              sys.exit(1)

          raw = t_res.json()
          if isinstance(raw, list):
              trades = raw
          else:
              trades = raw.get('trades') or raw.get('data') or raw.get('items') or []
          log(f'FOUND {len(trades)} TRADES')

          # 4. SYNC TO NOTION
          for t in trades:
              trade_id = t.get('id', 'unknown')
              exit_time = t.get('exitTime')
              if not exit_time:
                  log(f'SKIPPING TRADE {trade_id} - no exitTime (still open)')
                  continue

              log(f'SENDING TRADE {trade_id}')
              headers = {
                  'Authorization': f'Bearer {os.environ.get("NOTION_TOKEN")}',
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json'
              }
              payload = {
                  'parent': {'database_id': os.environ.get('NOTION_DATABASE_ID')},
                  'properties': {
                      'Symbol': {'title': [{'text': {'content': f'{t.get("symbol", "N/A")} | ${t.get("netPnL", 0)}'}}]},
                      'Trade ID': {'rich_text': [{'text': {'content': str(trade_id)}}]},
                      'P&L': {'number': float(t.get('netPnL', 0))},
                      'Exit Time': {'date': {'start': exit_time}}
                  }
              }
              n_res = requests.post('https://api.notion.com/v1/pages', headers=headers, json=payload)
              if n_res.status_code not in (200, 201):
                  log(f'NOTION FAILED for trade {trade_id}: {n_res.status_code} - {n_res.text}')
              else:
                  log(f'TRADE {trade_id} SYNCED OK')

          log('FINISHED')
          EOF
