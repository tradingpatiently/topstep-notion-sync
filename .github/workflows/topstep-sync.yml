name: Real-Time Trade Sync
on:
  workflow_dispatch:
    inputs:
      force_eod:
        description: 'Force EOD run to update Post-Exit data'
        required: false
        default: 'false'
  schedule:
    - cron: '*/5 13-20 * * 1-5'
    - cron: '0 20,21 * * 1-5'
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Requests
        run: pip install requests
      - name: Run Sync
        env:
          PROJECTX_USERNAME: ${{ secrets.PROJECTX_USERNAME }}
          PROJECTX_API_KEY: ${{ secrets.PROJECTX_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TRIGGERED_BY: ${{ github.event_name }}
          FORCE_EOD: ${{ github.event.inputs.force_eod }}
        run: python sync.py
