name: Real-Time Trade Sync
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Requests
        run: pip install requests
      - name: Run Sync
        env:
          PROJECTX_USERNAME: ${{ secrets.PROJECTX_USERNAME }}
          PROJECTX_API_KEY: ${{ secrets.PROJECTX_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python - <<'EOF'
          import os, requests, sys
          from datetime import datetime

          def log(m): print(f'--- {m}', flush=True)

          BASE = 'https://api.topstepx.com/api'
          NOTION_TOKEN = os.environ.get('NOTION_TOKEN')
          NOTION_DATABASE_ID = os.environ.get('NOTION_DATABASE_ID')

          # 1. AUTH
          log('STARTING AUTH')
          u = os.environ.get('PROJECTX_USERNAME')
          k = os.environ.get('PROJECTX_API_KEY')

          res = requests.post(
              f'{BASE}/Auth/loginKey',
              json={'userName': u, 'apiKey': k}
          )
          if res.status_code != 200:
              log(f'AUTH FAILED: {res.status_code} - {res.text}')
              sys.exit(1)

          token = res.json().get('token')
          log('AUTH SUCCESS')

          # 2. GET ACCOUNT ID
          log('FETCHING ACCOUNT ID')
          auth_headers = {
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'Accept': 'application/json'
          }
          acc_res = requests.post(
              f'{BASE}/Account/search',
              headers=auth_headers,
              json={'onlyActiveAccounts': True}
          )
          if acc_res.status_code != 200:
              log(f'ACCOUNT FETCH FAILED: {acc_res.status_code} - {acc_res.text}')
              sys.exit(1)

          acc_raw = acc_res.json()
          accounts = acc_raw if isinstance(acc_raw, list) else acc_raw.get('accounts') or acc_raw.get('data') or []
          if not accounts:
              log('NO ACCOUNTS FOUND')
              sys.exit(1)

          account_id = accounts[0].get('id')
          log(f'USING ACCOUNT ID: {account_id}')

          # 3. FETCH TRADES
          log('FETCHING TRADES')
          t_res = requests.post(
              f'{BASE}/Trade/search',
              headers=auth_headers,
              json={'accountId': account_id, 'startTime': '2026-03-30T00:00:00Z'}
          )
          if t_res.status_code != 200:
              log(f'FETCH FAILED: {t_res.status_code} - {t_res.text}')
              sys.exit(1)

          raw = t_res.json()
          if isinstance(raw, list):
              trades = raw
          else:
              trades = raw.get('trades') or raw.get('data') or raw.get('items') or []
          log(f'FOUND {len(trades)} TRADES')

          # 4. SYNC TO NOTION - only closed fills (profitAndLoss is not None)
          notion_headers = {
              'Authorization': f'Bearer {NOTION_TOKEN}',
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
          }

          synced = 0
          for t in trades:
              trade_id = t.get('id', 'unknown')
              pnl = t.get('profitAndLoss')
              if pnl is None:
                  log(f'SKIPPING TRADE {trade_id} - entry fill, no P&L')
                  continue

              trade_date = t.get('creationTimestamp')
              if not trade_date:
                  log(f'SKIPPING TRADE {trade_id} - no date')
                  continue

              # Parse asset from contractId e.g. CON.F.US.MNQ.M26 -> MNQ
              contract_id = t.get('contractId', '')
              parts = contract_id.split('.')
              asset = parts[3] if len(parts) >= 4 else contract_id

              fees = float(t.get('fees', 0) or 0)
              net_pnl = round(float(pnl) - fees, 2)
              size = t.get('size', 1)
              side = t.get('side')
              direction = 'Long' if side == 0 else 'Short' if side == 1 else 'Unknown'
              entry_price = float(t.get('price', 0) or 0)

              log(f'SENDING TRADE {trade_id} | {asset} | {direction} | P&L: ${net_pnl}')

              properties = {
                  'Session': {'title': [{'text': {'content': f'{asset} {direction} | ${net_pnl}'}}]},
                  'Trade ID': {'rich_text': [{'text': {'content': str(trade_id)}}]},
                  'Direction': {'select': {'name': direction}},
                  'Entry Price': {'number': entry_price},
                  'Exit Time': {'date': {'start': trade_date}},
                  'P&L': {'number': net_pnl},
                  'Commissions': {'number': fees},
                  'Contract Size': {'number': float(size)},
              }

              payload = {
                  'parent': {'database_id': NOTION_DATABASE_ID},
                  'properties': properties
              }

              n_res = requests.post('https://api.notion.com/v1/pages', headers=notion_headers, json=payload)
              if n_res.status_code not in (200, 201):
                  log(f'NOTION FAILED for trade {trade_id}: {n_res.status_code} - {n_res.text}')
              else:
                  log(f'TRADE {trade_id} SYNCED OK')
                  synced += 1

          log(f'FINISHED - {synced} trades synced to Notion')
          EOF
