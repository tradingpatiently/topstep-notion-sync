name: Real-Time Trade Sync
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Requests
        run: pip install requests
      - name: Run Sync
        env:
          PROJECTX_USERNAME: ${{ secrets.PROJECTX_USERNAME }}
          PROJECTX_API_KEY: ${{ secrets.PROJECTX_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python - <<'EOF'
          import os, requests, sys

          def log(m): print(f'--- {m}', flush=True)

          NOTION_TOKEN = os.environ.get('NOTION_TOKEN')
          NOTION_DATABASE_ID = os.environ.get('NOTION_DATABASE_ID')

          notion_headers = {
              'Authorization': f'Bearer {NOTION_TOKEN}',
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
          }

          # Fetch database schema to find all property names and types
          db_res = requests.get(
              f'https://api.notion.com/v1/databases/{NOTION_DATABASE_ID}',
              headers=notion_headers
          )
          if db_res.status_code != 200:
              log(f'DB FETCH FAILED: {db_res.status_code} - {db_res.text}')
              sys.exit(1)

          db = db_res.json()
          log('DATABASE PROPERTIES:')
          for name, prop in db.get('properties', {}).items():
              log(f'  {name!r} -> type: {prop["type"]}')

          log('FINISHED')
          EOF
